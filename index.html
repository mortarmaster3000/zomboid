<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>zomboid</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oswald:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="layout">

    <div class="map-panel">
      <iframe
        src="https://b42map.com/"
        class="map-frame"
        title="Project Zomboid B42 Map"
        allowfullscreen
      ></iframe>
    </div>

    <aside class="objectives-panel">

      <div class="add-objective-form">
        <button class="btn btn-add full-width" onclick="openModal()">+ ADD OBJECTIVE</button>
      </div>

      <div class="filter-tabs">
        <button class="tab active" onclick="setFilter('all', this)">ALL</button>
        <button class="tab" onclick="setFilter('active', this)">UNFINISHED</button>
        <button class="tab" onclick="setFilter('done', this)">FINISHED</button>
      </div>

      <div class="objectives-list" id="objectives-list">
        <div class="empty-state" id="empty-state">
          <span>theres nothing here</span>
        </div>
      </div>

    </aside>
  </div>

  <!-- EDIT MODAL -->
  <div class="modal-overlay hidden" id="modal-overlay" onclick="overlayClick(event)">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-title" id="modal-title-label">NEW OBJECTIVE</span>
        <button class="modal-close" onclick="closeModal()">✕</button>
      </div>
      <div class="modal-body">
        <label class="modal-label">OBJECTIVE</label>
        <input type="text" id="modal-obj-title" class="obj-input" placeholder="" maxlength="80" />
        <label class="modal-label" style="margin-top:12px">DESCRIPTION</label>
        <textarea id="modal-obj-desc" class="obj-input obj-textarea" placeholder="" maxlength="300"></textarea>
        <div class="modal-actions">
          <button class="btn btn-add" onclick="saveObjective()">SAVE</button>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
